<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0e1230">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>ホー博士のクイズ｜投稿ダッシュボード</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo"><span class="dot"></span><span>投稿ダッシュボード</span></div>
  <div style="display:flex;gap:14px;align-items:center">
    <span id="refresh" title="更新" style="color:var(--cyan);cursor:pointer;font-size:18px">🔄</span>
    <a class="streak" id="setuplink" href="setup.html" style="color:var(--cyan);text-decoration:none;font-weight:700">⚙ 設定ガイド</a>
  </div>
</header>

<div class="stats">
  <div class="stat"><span>今週</span><b id="st-week">0 / 0</b></div>
  <div class="stat"><span>未投稿</span><b id="st-todo">0</b></div>
  <div class="stat"><span>在庫</span><b id="st-stock">0</b></div>
</div>

<div id="today-wrap"></div>
<div class="sec" id="up-sec" style="display:none"><span>これから</span></div>
<div id="list"></div>

<div class="toast" id="toast">コピーしました</div>

<script src="app.js"></script>
</body>
</html>
